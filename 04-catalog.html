<!DOCTYPE html>
<html lang="en">
<!-- PROMPT VERSION: 1.1 | TARGET: product_catalog -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISCOUNT CIRCULAR - CLEARANCE!</title>
    <style>
        :root {
            --bg-newsprint: #f3efdf;
            --sale-red: #ff0000;
            --highlight-yellow: #ffff00;
            --font-display: 'Impact', 'Arial Black', sans-serif;
            --font-desc: 'Georgia', 'Times New Roman', serif;
        }

        body {
            margin: 0;
            background-color: var(--bg-newsprint);
            color: #000;
            /* Pure CSS Halftone / Noise Effect */
            background-image: radial-gradient(#000 10%, transparent 20%);
            background-size: 4px 4px;
            /* Using mix-blend to soften the dots into newsprint texture */
            mix-blend-mode: multiply;
            font-family: var(--font-desc);
            overflow-x: hidden;
        }

        /* Loud Header */
        header {
            background: var(--sale-red);
            color: #fff;
            padding: 10px;
            text-align: center;
            border-bottom: 5px solid #000;
            position: relative;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            margin: 0;
            text-shadow: 3px 3px 0 #000;
            letter-spacing: 2px;
            transform: scaleY(1.2);
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        /* Coupon Cut-out Filters */
        .filter-btn {
            background: #fff;
            border: 2px dashed #000;
            color: #000;
            font-family: var(--font-display);
            font-size: 1rem;
            padding: 5px 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--highlight-yellow);
            border-style: solid;
        }

        /* Dense Grid */
        main {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            background: rgba(243, 239, 223, 0.95);
            /* Mask heavy dots behind content */
            min-height: 100vh;
        }

        /* Mail-order Listing */
        .card {
            background: #fff;
            border: 3px solid #000;
            padding: 10px;
            box-shadow: 4px 4px 0 #000;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
        }

        .card-price {
            background: var(--sale-red);
            color: #fff;
            font-family: var(--font-display);
            font-size: 1.5rem;
            display: inline-block;
            padding: 2px 5px;
            align-self: flex-start;
            transform: rotate(-5deg);
            margin-bottom: 5px;
            border: 1px solid #000;
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            line-height: 1.1;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .card-desc {
            font-size: 0.8rem;
            line-height: 1.2;
            flex-grow: 1;
        }

        .card:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        /* Best Seller Sticker injected via CSS on hover */
        .card:hover::after {
            content: 'BEST SELLER!';
            position: absolute;
            top: -15px;
            right: -15px;
            background: var(--highlight-yellow);
            color: var(--sale-red);
            font-family: var(--font-display);
            font-size: 1.2rem;
            padding: 5px;
            transform: rotate(15deg);
            border: 3px solid #000;
            box-shadow: 2px 2px 0 #000;
        }

        /* Chaotic Product Detail Modal */
        dialog {
            background: #fff;
            border: 5px solid #000;
            padding: 0;
            width: 95%;
            max-width: 600px;
            box-shadow: 10px 10px 0 var(--sale-red);
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.8);
        }

        .modal-content {
            display: flex;
            flex-direction: column;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-pitch {
            background: var(--highlight-yellow);
            padding: 20px;
            text-align: center;
            border-bottom: 3px dashed #000;
            /* Cut here line */
        }

        .modal-pitch h2 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
        }

        .modal-reality {
            padding: 20px;
            background: var(--bg-newsprint);
        }

        .reality-header {
            background: #000;
            color: #fff;
            display: inline-block;
            font-family: var(--font-display);
            padding: 2px 5px;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .reality-text {
            font-size: 0.85rem;
            line-height: 1.3;
            margin: 0;
        }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #000;
            color: #fff;
            border: none;
            font-family: var(--font-display);
            font-size: 1rem;
            padding: 5px 10px;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <header>
        <h1>EVERYTHING MUST GO!!!</h1>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Full Catalog</button>
            <button class="filter-btn" data-filter="Glossy Pitch">Glossy Pitch</button>
            <button class="filter-btn" data-filter="Factory Reality">Factory Reality</button>
            <button class="filter-btn" data-filter="1-Star Reviews">1-Star Reviews</button>
            <button class="filter-btn" data-filter="Grey Market">Grey Market</button>
        </div>
    </header>

    <main id="grid"></main>

    <dialog id="dossier-modal">
        <div class="modal-content" id="dossier-body">
            <!-- Populated via JS -->
        </div>
    </dialog>

    <script>
        // --- PASTE SITES HERE ---
        const sites = [
            {
                price: "$19.99",
                title: "Miracle Sleep Helmet",
                category: "Glossy Pitch",
                pitch: "ACHIEVE 8 HOURS OF SLEEP IN 20 MINUTES!",
                factory: "Plastic casing molded from recycled medical waste. Wiring is unshielded.",
                reviews: "'It just vibrated my teeth until I passed out.' - User44",
                grey: "Originally designed as a non-lethal crowd control device. Rebranded for consumer market."
            },
            {
                price: "$4.50",
                title: "Nutrient Paste Tubes",
                category: "1-Star Reviews",
                pitch: "ALL YOUR DAILY VITAMINS IN ONE TASTY SQUIRT!",
                factory: "Main ingredient is synthesized cellulose. Facility lacks pest control.",
                reviews: "'Tastes like drywall and makes my hair fall out.' - AngryMom99",
                grey: "Rejected military rations from 2018. Expiration dates scratched off manually."
            },
            {
                price: "$99.00",
                title: "Pocket EMF Blocker",
                category: "Grey Market",
                pitch: "PROTECT YOUR DNA FROM 5G RAYS!",
                factory: "Literally just a block of lead painted with metallic spray paint.",
                reviews: "'It's very heavy and ruins my pants pockets.' - TruthSeeker",
                grey: "Imported under false manifests as 'fishing weights' to avoid FDA scrutiny."
            },
            {
                price: "$12.99",
                title: "Forever Glow-stick",
                category: "Factory Reality",
                pitch: "NEVER BUY BATTERIES AGAIN! GLOWS FOREVER!",
                factory: "Contains trace amounts of Tritium-3. Workers not provided lead aprons.",
                reviews: "'It's bright, but it makes my geiger counter click.' - PrepperDan",
                grey: "Banned in 14 countries. Shipped via unregulated maritime freight."
            }
        ];
        // ------------------------

        const grid = document.getElementById('grid');
        const modal = document.getElementById('dossier-modal');
        const dossierBody = document.getElementById('dossier-body');
        const filterBtns = document.querySelectorAll('.filter-btn');

        function renderCards() {
            grid.innerHTML = '';
            sites.forEach((site, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.category = site.category;

                card.innerHTML = `
                    <div class="card-price">${site.price}</div>
                    <div class="card-title">${site.title}</div>
                    <div class="card-desc">${site.pitch.substring(0, 50)}...</div>
                `;

                card.addEventListener('click', () => openModal(site));
                grid.appendChild(card);
            });
        }

        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');

                const filter = e.target.dataset.filter;
                const cards = document.querySelectorAll('.card');

                cards.forEach(card => {
                    if (filter === 'all' || card.dataset.category === filter) {
                        card.classList.remove('hidden');
                    } else {
                        card.classList.add('hidden');
                    }
                });
            });
        });

        function openModal(site) {
            dossierBody.innerHTML = `
                <button class="close-btn" onclick="document.getElementById('dossier-modal').close()">X</button>
                <div class="modal-pitch">
                    <h2>${site.title}</h2>
                    <h3 style="color: var(--sale-red); font-family: var(--font-display); margin: 5px 0;">ONLY ${site.price}!!!</h3>
                    <p style="font-weight: bold; font-family: var(--font-display);">${site.pitch}</p>
                </div>
                <div class="modal-reality">
                    <div class="reality-header">FACTORY LOGS</div>
                    <p class="reality-text">${site.factory}</p>
                    
                    <div class="reality-header">VERIFIED BUYER REVIEW</div>
                    <p class="reality-text" style="font-style: italic;">${site.reviews}</p>

                    <div class="reality-header">GREY MARKET REGULATORY WARNING</div>
                    <p class="reality-text" style="font-weight: bold;">${site.grey}</p>
                </div>
            `;
            modal.showModal();
        }

        modal.addEventListener('click', (e) => {
            const dialogDimensions = modal.getBoundingClientRect()
            if (
                e.clientX < dialogDimensions.left || e.clientX > dialogDimensions.right ||
                e.clientY < dialogDimensions.top || e.clientY > dialogDimensions.bottom
            ) { modal.close(); }
        });

        renderCards();
    </script>
</body>

</html>
