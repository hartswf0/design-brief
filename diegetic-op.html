<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Design Fiction Idioms — Prompt Operator</title>
    <style>
        :root {
            --bg: #ffffff;
            --ink: #0b0c0d;
            --ink-soft: #2e3135;
            --accent: #0b0c0d;
            --accent-soft: #3a3f45;
            --card: #ffffff;
            --line: #0b0c0d;
            --ok: #1f7a37;
            --shadow: 0 8px 22px rgba(11, 12, 13, 0.08);
            --radius: 12px
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            color: var(--ink);
            background: var(--bg);
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
            line-height: 1.4
        }

        .shell {
            max-width: 640px;
            margin: 0 auto;
            padding: 8px 10px 90px
        }

        .hero {
            border: 2px solid var(--line);
            background: #fff;
            border-radius: var(--radius);
            padding: 12px 10px;
            margin-bottom: 8px
        }

        h1 {
            margin: 0 0 2px;
            font-size: clamp(1.05rem, 2.8vw, 1.3rem);
            letter-spacing: .07em;
            font-weight: 900;
            text-transform: uppercase
        }

        .hero p {
            margin: 0;
            color: var(--ink-soft);
            font-size: .8rem;
            max-width: 70ch
        }

        .hero a {
            color: var(--ink);
            font-weight: 700;
            text-decoration: underline
        }

        .cat-strip {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 6px;
            margin-top: 8px
        }

        .cat-btn {
            appearance: none;
            border: 2px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--ink);
            min-height: 58px;
            display: grid;
            gap: 2px;
            place-content: center;
            text-align: center;
            padding: 6px 2px;
            cursor: pointer;
            font: inherit
        }

        .cat-btn[aria-selected="true"] {
            background: #0b0c0d;
            color: #fff
        }

        .cat-glyph {
            font-size: 1rem;
            font-weight: 900;
            line-height: 1
        }

        .cat-word {
            font-size: .58rem;
            font-weight: 900;
            letter-spacing: .05em;
            text-transform: uppercase;
            line-height: 1.1
        }

        .def-box {
            border: 2px solid var(--line);
            border-radius: var(--radius);
            background: #fff;
            padding: 8px 10px;
            margin-bottom: 8px
        }

        .def-box p {
            margin: 0;
            font-size: .78rem;
            color: var(--ink-soft);
            line-height: 1.5
        }

        .def-box .ts {
            font-size: .66rem;
            font-weight: 800;
            color: var(--accent-soft);
            letter-spacing: .04em;
            margin-bottom: 4px
        }

        .step-strip {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 6px;
            margin-bottom: 8px
        }

        .step-btn {
            appearance: none;
            border: 2px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--ink);
            min-height: 46px;
            display: grid;
            gap: 1px;
            place-content: center;
            text-align: center;
            padding: 4px 2px;
            cursor: pointer;
            font: inherit
        }

        .step-btn[aria-selected="true"] {
            background: #0b0c0d;
            color: #fff
        }

        .step-glyph {
            font-size: .9rem;
            font-weight: 900;
            line-height: 1
        }

        .step-word {
            font-size: .56rem;
            font-weight: 900;
            letter-spacing: .04em;
            text-transform: uppercase;
            line-height: 1.1
        }

        .single-action {
            border: 2px solid var(--line);
            border-radius: var(--radius);
            background: #fff;
            padding: 8px;
            margin-bottom: 8px
        }

        .one-button {
            width: 100%;
            min-height: 52px;
            font-size: .96rem;
            font-weight: 900;
            letter-spacing: .03em;
            background: #0b0c0d;
            color: #fff;
            border-color: #0b0c0d
        }

        button {
            border: 2px solid var(--line);
            border-radius: 10px;
            background: #fff;
            color: var(--ink);
            font: inherit;
            font-weight: 800;
            padding: 9px 10px;
            cursor: pointer;
            min-height: 42px;
            transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
            font-size: .86rem
        }

        button:hover,
        button:focus-visible {
            border-color: var(--accent-soft);
            box-shadow: 0 0 0 3px rgba(11, 12, 13, .12);
            outline: none
        }

        button:active {
            transform: translateY(1px)
        }

        .step-status {
            border: 2px solid var(--line);
            border-radius: 8px;
            padding: 8px 9px;
            font-size: .78rem;
            font-weight: 800;
            margin-bottom: 6px;
            background: #fff;
            letter-spacing: .04em;
            text-transform: uppercase
        }

        .step-status strong {
            font-size: .92em;
            letter-spacing: .03em
        }

        #cards {
            display: grid;
            gap: 8px
        }

        .card {
            border: 2px solid var(--line);
            border-radius: var(--radius);
            background: var(--card);
            overflow: hidden
        }

        .card[hidden] {
            display: none
        }

        .card-head {
            padding: 8px 10px;
            border-bottom: 2px solid var(--line);
            background: #fff
        }

        .card h3 {
            margin: 0;
            font-size: .9rem;
            line-height: 1.2;
            letter-spacing: .01em
        }

        .meta {
            padding: 8px 10px;
            display: grid;
            gap: 5px
        }

        .meta p {
            margin: 0;
            font-size: .78rem;
            color: var(--ink);
            font-weight: 700
        }

        .card-actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px
        }

        .heuristics {
            display: grid;
            gap: 4px;
            margin: 2px 0 0;
            padding: 0;
            list-style: none
        }

        .heuristics li {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 4px 8px;
            font-size: .66rem;
            font-weight: 800;
            line-height: 1.2;
            width: fit-content;
            max-width: 100%;
            background: #fff
        }

        details {
            border-top: 2px solid var(--line);
            padding: 0 10px 8px
        }

        details summary {
            cursor: pointer;
            list-style: none;
            font-weight: 900;
            padding: 8px 0 6px;
            font-size: .74rem;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--accent-soft)
        }

        details summary::-webkit-details-marker {
            display: none
        }

        .prompt-reader {
            width: 100%;
            min-height: 200px;
            max-height: 50vh;
            overflow: auto;
            border: 2px solid var(--line);
            border-radius: 8px;
            padding: 8px;
            font-size: .74rem;
            line-height: 1.58;
            white-space: pre-wrap;
            word-break: break-word;
            background: #fff;
            color: #0b0c0d;
            font-family: "Menlo", "Consolas", "SFMono-Regular", monospace;
            -webkit-overflow-scrolling: touch
        }

        .prompt-reader:focus-visible {
            outline: 3px solid rgba(11, 12, 13, .2);
            border-color: var(--accent-soft)
        }

        .tag-name {
            font-weight: 900;
            color: #000;
            background: #eef0f2;
            border-radius: 4px;
            padding: 0 2px
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%) translateY(18px);
            background: #111;
            color: #fff;
            border-radius: 999px;
            padding: 9px 14px;
            font-size: .86rem;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: opacity .18s ease, transform .18s ease;
            box-shadow: 0 8px 20px rgba(24, 44, 16, .32);
            z-index: 999
        }

        .toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0)
        }

        .mini {
            font-size: .72rem;
            color: var(--ink-soft);
            margin-top: 2px
        }

        @media(min-width:760px) {
            .shell {
                padding: 14px 14px 120px
            }

            #cards {
                grid-template-columns: repeat(2, minmax(0, 1fr))
            }
        }
    </style>
</head>

<body>
    <main class="shell">
        <section class="hero" aria-label="Design Fiction Operator intro">
            <h1>Design Fiction Operator</h1>
            <p>Julian Bleecker's four idioms — each with a full SITE → DIG → INFER → BUILD pipeline. <a
                    href="https://www.youtube.com/live/LD18cthEhys?si=h-9JyW_5aEC7Mvul" target="_blank">Source ↗</a></p>
            <div id="cat-strip" class="cat-strip" aria-label="Category selector"></div>
        </section>

        <section id="def-box" class="def-box" aria-label="Category definition"></section>

        <div id="step-strip" class="step-strip" aria-label="Prompt step selector"></div>

        <section class="single-action" aria-label="One button mode">
            <div id="step-status" class="step-status" aria-live="polite">FILM · 1/4</div>
            <p id="step-hint" class="mini">Tap to copy prompt + advance to next step.</p>
            <button id="one-button" class="one-button">◎ COPY + NEXT</button>
        </section>

        <section id="cards" aria-label="Prompt cards"></section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="diegetic-op-data.js"></script>
    <script src="diegetic-op-engine.js"></script>
</body>

</html>
